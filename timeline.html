<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capstone II Roadmap - Dynamic Fit</title>

<style>
:root {
    --primary: #0f172a; 
    --accent: #2563eb;  
    --pre-phase: #94a3b8;
    --buffer-color: #64748b;
    --line-color: #cbd5e1;
    --bg: #ffffff;
    --card-bg: #f8fafc;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.slide-frame {
    width: 1380px;
    height: 720px;
    background: var(--bg);
    position: relative;
    padding: 40px 60px;
    display: flex;
    flex-direction: column;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 3px solid var(--accent);
    padding-bottom: 15px;
    flex-shrink: 0;
}

.title-area h1 { margin: 0; font-size: 2.6rem; color: var(--primary); }
.title-area p { margin: 5px 0 0; font-size: 1.1rem; color: var(--accent); }

.milestone {
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 800;
}

.timeline-container {
    position: relative;
    flex-grow: 1;
    display: flex;
    align-items: center;
}

.base-line {
    position: absolute;
    top: 50%;
    width: 100%;
    height: 6px;
    background: var(--line-color);
    transform: translateY(-50%);
}

/* ✅ FIXED */
.nodes-container {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 10;
}

/* ✅ FIXED */
.node {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    flex: 1;
    min-width: 0;
}

/* stagger */
.node:nth-child(odd) .card { bottom: 45px; position: absolute; }
.node:nth-child(even) .card { top: 45px; position: absolute; }

.dot {
    width: 24px; 
    height: 24px;
    background: white;
    border: 5px solid var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 5px white;
}

/* keep your dynamic width */
.card {
    width: max-content;
    max-width: 370px;
    background: var(--card-bg);
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 10px 15px rgba(0,0,0,0.05);
}

/* content */
.card-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 12px;
}

.phase-id {
    font-size: 0.65rem;
    font-weight: 900;
    color: var(--accent);
    text-transform: uppercase;
}

.week-indicator {
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 800;
}

.phase-name {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 8px;
}

.task-list {
    margin: 0;
    padding: 8px 0 0;
    list-style: none;
    border-top: 1px solid #e2e8f0;
}

.task-item {
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 20px;
}

/* ✅ FIXED overflow issue */
.task-name {
    white-space: normal;
    word-break: break-all;
}

.task-owner {
    font-weight: 700;
    color: var(--accent);
    font-size: 0.65rem;
}

/* variants */
.pre-node .card { border: 2px solid var(--pre-phase); }
.pre-node .dot { border-color: var(--pre-phase); }
.pre-node .week-indicator { background: var(--pre-phase); }

.buffer-node .card { border: 2px dashed var(--buffer-color); }
.buffer-node .dot { border-color: var(--buffer-color); }
.buffer-node .week-indicator { background: var(--buffer-color); }

</style>
</head>

<body>

<div class="slide-frame">
<header>
    <div class="title-area">
        <h1>Capstone II Roadmap</h1>
        <p>Adaptive Development Timeline</p>
    </div>
    <div class="milestone">Target: Final Presentation</div>
</header>

<div class="timeline-container">
    <div class="base-line"></div>
    <div id="timeline-root" class="nodes-container"></div>
</div>
</div>

<script>
const roadmap = [
    {
        phase: "Pre-Capstone II",
        name: "Planning & Setup",
        isPre: true,
        tasks: [
            { t: "LMS Workflow API & Authenication", o: "Vathanak" }
        ]
    },
    {
        phase: "P1",
        name: "Core Features",
        tasks: [{ t: "LLM Grading Engine", o: "Vathanak" }]
    },
    {
        phase: "P2",
        name: "Features & Integration",
        tasks: [
            { t: "Connect NestJS & Python (gRPC)", o: "Vathanak" },
            { t: "BYOK, Credit, Payments ", o: "Vathanak" },
        ]
    },
    {
        phase: "P3",
        name: "Features & Integration",
        tasks: [
            { t: "Unit Testing", o: "V.Nak & C.Panha" },
            { t: "Admin Dashboard", o: "V.Nak & C.Panha" },
            { t: "OWASP Standard", o: "Vathanak" }
        ]
    },   
    {
        phase: "P4",
        name: "Testing & Deployment",
        tasks: [
            { t: "AWS Infrastructure & CI/CD", o: "Vathanak" },
            { t: "Documentation", o: "All" }
        ]
    },
    {
        phase: "P5",
        name: "Buffer / Review",
        isBuffer: true,
        tasks: [
            { t: "Final Review", o: "All" }
        ]
    }
];

function buildTimeline() {
    const root = document.getElementById('timeline-root');

    roadmap.forEach((item, index) => {
        let weekLabel = item.isPre ? "WK 0" : `WK ${index*2-1}-${index*2}`;

        const nodeDiv = document.createElement('div');
        nodeDiv.className = `node ${item.isPre ? 'pre-node' : ''} ${item.isBuffer ? 'buffer-node' : ''}`;

        nodeDiv.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <span class="phase-id">${item.phase}</span>
                    <span class="week-indicator">${weekLabel}</span>
                </div>
                <div class="phase-name">${item.name}</div>
                <ul class="task-list">
                    ${item.tasks.map(task => `
                        <li class="task-item">
                            <span class="task-name">${task.t}</span>
                            <span class="task-owner">${task.o}</span>
                        </li>
                    `).join('')}
                </ul>
            </div>
            <div class="dot"></div>
        `;

        root.appendChild(nodeDiv);
    });
}

buildTimeline();
</script>

</body>
</html>
