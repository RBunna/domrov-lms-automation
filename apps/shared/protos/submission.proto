syntax = "proto3";
package submission;

// Service for handling code submission processing and file content retrieval.
service SubmissionService {
  // Processes a submission request and returns the submission response with file content.
  rpc ProcessSubmission(SubmissionRequest) returns (SubmissionResponse);
  
  // Get submission resource, rubric, and optional AI info
  rpc GetSubmission(SubmissionContentRequest) returns (SubmissionContentResponse);

  // Get submission resource via submission id,
  rpc GetSubmissionResource(SubmissionResourceRequest) returns (SubmissionResourceResponse);

}

// Request to fetch submission content
message SubmissionContentRequest {
  string submission_id = 1; // ID of the submission
}

message SubmissionResourceRequest {
  string submission_id = 1; // ID of the submission
}

message SubmissionResourceResponse {
  string resource_url = 1; // ID of the submission
}

// Response including submission metadata, rubric, and optional AI key info
message SubmissionContentResponse {
  string submission_id = 1;          // Submission ID
  string instructions = 2;           // Instructions for the assessment
  string resource_url = 3;           // URL of the repo / resource
  repeated RubricCriterion rubric = 4; // List of rubric criteria
  AIKeyInfo ai = 5;
}

// Rubric item
message RubricCriterion {
  string criterion = 1; // Description of the requirement
  int32 weight = 2;     // Weight for grading
}

// Optional AI key info (sent only in USER mode with valid key)
message AIKeyInfo {
  string provider = 1;     // openai, anthropic, etc.
  string api_key = 2;      // decrypted key (sent securely over gRPC)
  string api_endpoint = 3; // API endpoint
  string model = 4;        // Model name
  string label = 5;        // Optional label for teacher
}

// Original submission request
message SubmissionRequest {
  string submission_id = 1;
  string file_path = 2;
}

// Original submission response
message SubmissionResponse {
  bool success = 1;
  string message = 2;
  FileContent file = 3;
}

// Original file content
message FileContent {
  string type = 1;
  string name = 2;
  string path = 3;
  repeated string content = 4;
}