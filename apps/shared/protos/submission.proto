// submission.proto
syntax = "proto3";
package submission;

// Service for handling code submission processing and file content retrieval.
service SubmissionService {
  // Processes a submission request and returns the submission response with file content.
  rpc ProcessSubmission(SubmissionRequest) returns (SubmissionResponse);
  
  // Get submission resource and rubric
  rpc GetSubmission(SubmissionContentRequest) returns (SubmissionContentResponse);

}
message SubmissionContentRequest {
  string submission_id = 1; // ID of the submission
}

message SubmissionContentResponse {
  string submission_id = 1;    // Submission ID
  string instrctions =2;
  string resource_url = 3;    // URL of the repo / resource
  repeated RubricCriterion rubric = 4; // List of rubric criteria
}
message RubricCriterion {
  string criterion = 1; // Description of the requirement
  int32 weight = 2;     // Weight for grading
}


message SubmissionRequest {
  string submission_id = 1;
  string file_path = 2;
}

message SubmissionResponse {
  bool success = 1;
  string message = 2;
  FileContent file = 3;
}

message FileContent {
  string type = 1;
  string name = 2;
  string path = 3;
  repeated string content = 4;
}
