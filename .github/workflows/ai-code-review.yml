name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main] # change to other branches if needed

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y
          gh auth setup-git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get code diff
        id: get_diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin +refs/pull/${{ github.event.pull_request.number }}/merge
            git diff origin/main...HEAD > pr.diff
          else
            git fetch origin main
            git diff origin/main~1...HEAD > pr.diff
          fi
          echo "Diff saved to pr.diff"

      - name: Run AI review on diff
        id: code_review
        uses: actions/ai-inference@v1
        with:
          prompt: |
            You are an expert software engineer and security analyst.
            Review the following code diff.
            - Detect logic errors or bugs
            - Detect security vulnerabilities
            - Suggest improvements and best practices
            - Provide concise feedback
            Code Diff:
            $(cat pr.diff)

      - name: Comment AI review on PR or commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "${{ steps.code_review.outputs.response }}"
          else
            gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
              -f body="${{ steps.code_review.outputs.response }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}