name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      nestjs: ${{ steps.filter.outputs.nestjs }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v3

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nestjs:
              - 'apps/backend_nest/**'
            python:
              - 'apps/code_eval/**'

  build-nestjs:
    needs: changes
    if: needs.changes.outputs.nestjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push NestJS
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend_nest
          push: true
          no-cache: true
          pull: true
          tags: |
            phyvathanak/nestjs-backend:latest
            phyvathanak/nestjs-backend:${{ github.sha }}

      - name: Deploy NestJS to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_NEST_JS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_NEST_JS }}
          script: |
            set -e

            IMAGE=phyvathanak/nestjs-backend:${{ github.sha }}

            echo "Stopping old container..."
            docker stop nestjs-backend || true
            docker rm nestjs-backend || true

            echo "Removing old images..."
            docker image prune -af || true

            echo "Pulling fresh image..."
            docker pull $IMAGE

            echo "Running new container..."
            docker run -d \
              --name nestjs-backend \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              -p 3000:3000 \
              -p 50052:50052 \
              $IMAGE

  build-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Python
        uses: docker/build-push-action@v5
        with:
          context: ./apps/code_eval
          push: true
          no-cache: true
          pull: true
          tags: |
            phyvathanak/code_eval:latest
            phyvathanak/code_eval:${{ github.sha }}

      - name: Deploy Python to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_CODE_EVAL }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_CODE_EVAL }}
          script: |
            set -e

            IMAGE=phyvathanak/code_eval:${{ github.sha }}

            echo "Stopping old container..."
            docker stop code_eval || true
            docker rm code_eval || true

            echo "Removing old images..."
            docker image prune -af || true

            echo "Pulling fresh image..."
            docker pull $IMAGE

            echo "Running new container..."
            docker run -d \
              --name code_eval \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              -p 50051:50051 \
              $IMAGE