name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      nestjs: ${{ steps.filter.outputs.nestjs }}
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v3

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nestjs:
              - 'apps/backend_nest/**'
            python:
              - 'apps/code_eval/**'
            frontend:
              - 'apps/admin/**'

  test-nestjs:
    needs: changes
    if: needs.changes.outputs.nestjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Dependencies
        working-directory: ./apps/backend_nest
        run: npm ci
      - name: Run NestJS Tests
        working-directory: ./apps/backend_nest
        run: npm run test:ci

  build-nestjs:
    needs: [changes, test-nestjs]
    if: needs.changes.outputs.nestjs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & Push NestJS
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend_nest
          push: true
          no-cache: true
          pull: true
          tags: |
            phyvathanak/nestjs-backend:latest
            phyvathanak/nestjs-backend:${{ github.sha }}
      - name: Deploy NestJS to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_NEST_JS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_NEST_JS }}
          script: |
            set -e
            IMAGE=phyvathanak/nestjs-backend:${{ github.sha }}
            docker stop nestjs-backend || true
            docker rm nestjs-backend || true
            docker image prune -af || true
            docker pull $IMAGE
            docker run -d \
              --name nestjs-backend \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              -p 3000:3000 \
              -p 50052:50052 \
              $IMAGE

  build-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & Push Python
        uses: docker/build-push-action@v5
        with:
          context: ./apps/code_eval
          push: true
          no-cache: true
          pull: true
          tags: |
            phyvathanak/code_eval:latest
            phyvathanak/code_eval:${{ github.sha }}
      - name: Deploy Python to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_CODE_EVAL }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_CODE_EVAL }}
          script: |
            set -e
            IMAGE=phyvathanak/code_eval:${{ github.sha }}
            docker stop code_eval || true
            docker rm code_eval || true
            docker image prune -af || true
            docker pull $IMAGE
            docker run -d \
              --name code_eval \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              -p 50051:50051 \
              $IMAGE
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./apps/admin
        run: npm ci

      - name: Build React Frontend
        working-directory: ./apps/admin
        run: npm run build
        env:
          VITE_API_URL: https://api.domrov.app

      - name: Deploy to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_ADMIN }}
          SOURCE_DIR: ./apps/admin/dist

      - name: Invalidate CloudFront
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_ADMIN }}
          PATHS: "/*"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}