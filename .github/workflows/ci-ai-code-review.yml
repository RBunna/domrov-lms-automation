name: DOMROV AI Code Review (StarCoder)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  ai-code-review:
    name: AI Code Review with StarCoder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch transformers

      - name: Get list of changed files in PR
        id: changed-files
        run: |
          echo "Fetching changed files..."
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -E '^app/.*\.(ts|js|py)$' || true)
          echo "Changed files:"
          echo "$FILES"
          echo "FILES<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run StarCoder AI review
        id: ai_review
        run: |
          echo "Running StarCoder review on changed files..."
          # Concatenate all changed files
          CODE=""
          for file in $FILES; do
            if [ -f "$file" ]; then
              CODE="$CODE\n\n# File: $file\n$(cat $file)"
            fi
          done

          echo "Code length: ${#CODE}"

          python - <<END
          import os
          from transformers import AutoModelForCausalLM, AutoTokenizer, pipeline
          import torch

          MODEL_NAME = "bigcode/starcoder"
          tokenizer = AutoTokenizer.from_pretrained(MODEL_NAME)
          model = AutoModelForCausalLM.from_pretrained(MODEL_NAME)

          generator = pipeline(
              "text-generation",
              model=model,
              tokenizer=tokenizer,
              device=0 if torch.cuda.is_available() else -1,
          )

          code = """$CODE"""
          prompt = f"""
          You are an AI code reviewer. Analyze the following DOMROV project code:

          1. Detect syntax errors or runtime issues.
          2. Identify missing logic or potential bugs.
          3. Suggest improvements if applicable.

          Review only the changed files in the PR.

          Code:
          {code}

          Provide a clear, structured review.
          """

          # Limit output tokens to avoid huge responses
          result = generator(prompt, max_new_tokens=300)[0]['generated_text']
          review = result.replace(prompt, "").strip()

          with open("ai_review.txt", "w") as f:
              f.write(review)
          END

                - name: Set AI review as env variable
                  run: |
                    echo "AI_REVIEW<<EOF" >> $GITHUB_ENV
                    cat ai_review.txt >> $GITHUB_ENV
                    echo "EOF" >> $GITHUB_ENV

                - name: Comment on PR with StarCoder review
                  run: |
                    gh pr comment ${{ github.event.pull_request.number }} --body "$AI_REVIEW"
                  env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}